<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纹样基因库 - 扎染文化数字平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <style>
        /* 页面头部 */
        .page-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 4rem 0;
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* 内容区域 */
        .page-content {
            padding: 2rem 0;
        }

        .section {
            margin-bottom: 3rem;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 1.5rem;
        }

        /* 搜索和筛选区域 */
        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid var(--light-gray-color);
            border-radius: 30px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--medium-gray-color);
        }

        .filter-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-dropdown select {
            padding: 10px 15px;
            border: 1px solid var(--light-gray-color);
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
            min-width: 150px;
        }

        /* 文化卡片网格 */
        .culture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 2rem;
        }

        .culture-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border-top: 5px solid var(--primary-color);
            display: flex;
            flex-direction: column;
            height: 400px;
        }

        .culture-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .culture-card:nth-child(2n) {
            border-top-color: var(--secondary-color);
        }

        .culture-card:nth-child(3n) {
            border-top-color: var(--accent-color-1);
        }

        /* 图片展示样式 */
        .pattern-preview {
            height: 220px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #f8f9fa;
            position: relative;
        }

        .pattern-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.3s;
            cursor: zoom-in;
        }

        .culture-card:hover .pattern-image {
            transform: scale(1.05);
        }

        /* 文字内容区域 */
        .culture-header {
            padding: 20px;
            background: white;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .culture-icon {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .culture-card:nth-child(2n) .culture-icon {
            color: var(--secondary-color);
        }

        .culture-card:nth-child(3n) .culture-icon {
            color: var(--accent-color-1);
        }

        .culture-title {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 600;
        }

        .culture-desc {
            color: var(--dark-gray-color);
            font-size: 0.9rem;
            margin-bottom: 15px;
            flex: 1;
            line-height: 1.5;
        }

        .culture-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--medium-gray-color);
            margin-top: auto;
        }

        .culture-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 贡献者部分 */
        .contribute-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0;
            margin-top: 3rem;
            text-align: center;
            border-radius: 12px;
        }

        .contribute-section h2 {
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .contribute-section p {
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .contribute-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 25px;
            border: 2px solid white;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .contribute-btn:hover {
            background-color: white;
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        /* 图片放大模态框 */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: zoom-out;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .image-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 2001;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .culture-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }

            .culture-card {
                height: 380px;
            }

            .pattern-preview {
                height: 200px;
            }

            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .culture-grid {
                grid-template-columns: 1fr;
            }

            .culture-card {
                height: 360px;
            }

            .pattern-preview {
                height: 180px;
            }

            .contribute-section {
                padding: 2rem 0;
            }
        }
    </style>
</head>
<body>

                <div class="filter-dropdown">
                    <select id="sort-by">

                        <option value="newest">按时间排序</option>
                        <option value="downloads">按下载量排序</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 动态生成的纹样卡片容器 -->
        <div class="culture-grid" id="pattern-container">
            <!-- 卡片将通过JavaScript动态生成 -->
        </div>

        <!-- 贡献者部分 -->
        <div class="contribute-section">
            <div class="container">
                <h2>拥有纹样想要分享？</h2>
                <p>我们欢迎经过认证的文化传承者贡献内容</p>

                    <i class="fas fa-plus"></i> 申请成为贡献者

            </div>
        </div>
    </main>

    <!-- 图片放大模态框 -->
    <div class="image-modal" id="image-modal">
        <span class="modal-close" id="modal-close">&times;</span>
        <img src="" alt="" id="modal-image">
    </div>

    <!-- 页脚容器 -->
    <div id="footer"></div>

                        const iconClass = index % 3 === 0 ? 'fa-palette' :
                                        index % 3 === 1 ? 'fa-cloud' : 'fa-border-all';

                        const imagePath = `image/IMG_${pattern.id}.JPG`;

                        const card = document.createElement('div');
                        card.className = 'culture-card';
                        card.innerHTML = `
                            <div class="pattern-preview">
                                <img src="${imagePath}" alt="${pattern.title}纹样" class="pattern-image" data-id="${pattern.id}">
                            </div>
                            <div class="culture-header">
                                <div class="culture-icon"><i class="fas ${iconClass}"></i></div>
                                <h3 class="culture-title">${pattern.title}</h3>
                                <p class="culture-desc">${pattern.desc}</p>
                                <div class="culture-stats">
                                    <span><i class="fas fa-heart"></i> ${likes}</span>
                                    <span><i class="fas fa-download"></i> ${downloads}</span>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    });

                    addImageClickHandlers();
                }, 500);
            }

            // 图片点击放大功能
            function addImageClickHandlers() {
                const images = document.querySelectorAll('.pattern-image');
                images.forEach(img => {
                    img.addEventListener('click', function() {
                        modalImage.src = this.src;
                        modalImage.alt = this.alt;
                        imageModal.classList.add('show');
                    });
                });
            }

            // 关闭模态框
            modalClose.addEventListener('click', () => {
                imageModal.classList.remove('show');
            });

            imageModal.addEventListener('click', (e) => {
                if (e.target === imageModal) {
                    imageModal.classList.remove('show');
                }
            });

            // 搜索功能
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                filterPatterns();
            });

            // 分类筛选
            categoryFilter.addEventListener('change', function() {
                filterPatterns();
            });

            // 排序功能
            sortBy.addEventListener('change', function() {
                filterPatterns();
            });

            // 综合筛选函数
            function filterPatterns() {
                const searchTerm = searchInput.value.toLowerCase();
                const category = categoryFilter.value;
                const sortMethod = sortBy.value;

                filteredData = patternData.filter(pattern => {
                    const matchesSearch = pattern.title.toLowerCase().includes(searchTerm) ||
                                         pattern.desc.toLowerCase().includes(searchTerm);
                    const matchesCategory = !category || pattern.category === category;
                    return matchesSearch && matchesCategory;
                });

                if (sortMethod === 'popular') {
                    filteredData.sort((a, b) => Math.random() > 0.5 ? -1 : 1); // 模拟按热度排序
                } else if (sortMethod === 'newest') {
                    filteredData.sort((a, b) => b.id - a.id); // 按ID降序
                } else if (sortMethod === 'downloads') {
                    filteredData.sort((a, b) => Math.random() > 0.5 ? -1 : 1); // 模拟按下载量排序
                }

                generatePatternCards();
            }

            // 贡献者按钮点击事件
            document.getElementById('open-contribute-modal').addEventListener('click', function() {
                alert('感谢您的兴趣！贡献者申请功能即将开放。');
            });

            // 初始加载数据
            generatePatternCards();
        });

        // 加载公共部分
        function loadCommonParts() {
            // 加载页眉
            fetch('header.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById('header').innerHTML = data;
                })
                .catch(error => {
                    console.error('Error loading header:', error);
                    document.getElementById('header').innerHTML = '<div class="container"><a href="index.html" class="logo">檐下风铃</a></div>';
                });

            // 加载页脚
            fetch('footer.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById('footer').innerHTML = data;
                })
                .catch(error => {
                    console.error('Error loading footer:', error);
                    document.getElementById('footer').innerHTML = '<footer><div class="container"><p>&copy; 2023 檐下风铃</p></div></footer>';
                });
        }

card.className = 'culture-card';

function getSVGPathForPattern(id) {
    // 这里建立基因库ID与创意工坊中SVG纹样的映射关系
    const patternMap = {
        8823: 'M20,50 Q50,20 80,50 Q50,80 20,50 Z',      // 螺旋纹
        8824: 'M20,50 Q30,30 50,30 Q70,30 80,50 Q90,50 90,60 Q90,70 80,70 Q70,90 50,90 Q30,90 20,70 Q10,70 10,60 Q10,50 20,50 Z', // 云朵
        8826: 'M10,50 Q25,30 40,50 Q55,30 70,50 Q85,30 90,50', // 水波
        // 其他映射...
    };
    return patternMap[id] || ''; // 返回对应的SVG路径或空字符串
}
