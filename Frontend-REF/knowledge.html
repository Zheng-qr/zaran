<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科普百科 - 扎染文化数字平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <style>

        /* 科普百科页面基本样式 */
        main.knowledge-container {
            padding: 3rem 0;
        }

        /* 科普百科主体内容样式 */
        .knowledge-hub {
            padding: 2rem 0;
        }

        .knowledge-hub .hub-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .knowledge-hub .hub-header h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 0;
        }

        .knowledge-hub .hub-filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .knowledge-hub .hub-filters select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            min-width: 150px;
        }

        .knowledge-hub .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 2rem;
        }

        .knowledge-hub .contribute-prompt {
            text-align: center;
            margin-top: 3rem;
        }

        .knowledge-hub .contribute-prompt p {
            color: var(--dark-gray-color);
            margin-bottom: 1rem;
        }

        .knowledge-hub .contribute-prompt button {
            background-color: var(--secondary-color);
            color: var(--text-light-color);
            border: none;
            padding: 12px 25px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1rem;
        }

        .knowledge-hub .contribute-prompt button:hover {
            background-color: #10203a;
        }


        /* 内容编辑器样式 */
        .knowledge-editor {
            padding: 2rem 0;
        }

        .knowledge-editor .editor-meta {
            margin-bottom: 2rem;
        }

        .knowledge-editor .editor-meta input,
        .knowledge-editor .editor-meta select {
            padding: 10px 15px;
            border: 1px solid var(--medium-gray-color);
            border-radius: var(--border-radius);
            width: 100%;
            margin-bottom: 1rem;
        }

        .knowledge-editor .section-toolbox {
            background-color: var(--light-color);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            margin-bottom: 2rem;
        }

        .knowledge-editor .section-toolbox h3 {
            color: var(--secondary-color);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .knowledge-editor .section-toolbox .toolbox-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .knowledge-editor .section-toolbox .tool-item {
            background: white;
            border: 1px solid var(--medium-gray-color);
            border-radius: var(--border-radius);
            padding: 8px 15px;
            cursor: grab;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
        }

        .knowledge-editor .section-toolbox .tool-item i {
            margin-right: 8px;
            color: var(--primary-color);
        }

        .knowledge-editor .editor-canvas {
            min-height: 200px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px dashed var(--medium-gray-color);
            border-radius: var(--border-radius);
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .knowledge-editor .editor-actions button {
            background-color: var(--primary-color);
            color: var(--text-light-color);
            border: none;
            padding: 12px 25px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 1rem;
            margin-right: 10px;
            transition: background-color 0.3s;
        }
          .knowledge-editor .editor-actions button:hover {
            background-color: #2a62b9;
        }

        .tab-container {
            margin-top: 2rem;
        }

        .tab-buttons {
            display: flex;
            border-bottom: 1px solid var(--medium-gray-color);
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            border-bottom: 3px solid transparent;
               color: var(--dark-gray-color);
        }
          .tab-btn:hover {
                 color: var(--primary-color);
                 font-weight: normal;
          }

        .tab-btn.active {
            border-bottom-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: bold;
        }

        .tab-content {
            display: none;
            padding: 20px 0;
             background-color: var(--light-color);
             border-radius: var(--border-radius);
        }

        .tab-content.active {
            display: block;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow: auto;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            border-radius: var(--border-radius);
        }


        /* 自定义板块申请样式 */
        .pricing-tiers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }

        .pricing-tiers .tier {
            background: white;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--box-shadow);
            text-align: center;
        }

        .pricing-tiers .tier h3 {
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }

        .pricing-tiers .tier .price {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .pricing-tiers .tier ul {
            list-style: none;
            padding-left: 0;
        }

          /* 公用样式 */
         .culture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 2rem;
        }

        .culture-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            border-top: 5px solid var(--primary-color);
        }

        .culture-card:nth-child(2n) {
            border-top-color: var(--secondary-color);
        }

        .culture-card:nth-child(3n) {
            border-top-color: var(--accent-color-1);
        }

        .culture-header {
            padding: 20px;
            background: #f8f9fa;
        }

        .culture-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .culture-card:nth-child(2n) .culture-icon {
            color: var(--secondary-color);
        }

        .culture-card:nth-child(3n) .culture-icon {
            color: var(--accent-color-1);
        }

        .culture-title {
            font-size: 1.4rem;
            margin-bottom: 5px;
            color: var(--text-color);
        }

        .culture-desc {
            color: var(--dark-gray-color);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .culture-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--medium-gray-color);
        }

        .contribute-section {
            background: #f5f5f5;
            padding: 3rem 0;
            margin-top: 3rem;
            text-align: center;
        }

        .contribute-btn {
            background: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* 对比区域 */
        .comparison-section {
            margin-bottom: 3rem;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: white;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .comparison-table th,
        .comparison-table td {
            padding: 12px 15px;
            text-align: left;
            border: 1px solid #ddd;
              color: var(--text-color);
        }

        .comparison-table th {
            background-color: var(--primary-color);
            color: white;
        }

        .comparison-table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .highlight {
            background-color: rgba(245, 166, 35, 0.2) !important;
            font-weight: bold;
        }

        /* 技术专区 */
        .technique-section {
            margin-bottom: 3rem;
        }

        .technique-steps {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .step-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .step-card:hover {
            transform: translateY(-5px);
        }

        .step-icon {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            text-align: center;
        }

        .step-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-align: center;
        }

        .video-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            margin-top: 2rem;
        }

        .video-placeholder {
            height: 400px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1.2rem;
            border-radius: 4px;
        }

        .video-placeholder i {
            font-size: 3rem;
            margin-right: 15px;
        }


        @media (max-width: 768px) {

            .knowledge-hub .hub-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .knowledge-hub .knowledge-grid {
                grid-template-columns: 1fr;
            }

            .mobile-section-style {
                margin-top: 20px;
                margin-bottom: 20px;
            }
            .comparison-table {
                display: block;
                overflow-x: auto;
            }

            .technique-steps {
                grid-template-columns: 1fr;
            }

            .video-placeholder {
                height: 250px;
            }
        }
    </style>
</head>
    <!-- 页眉容器 -->
    <div id="header"></div>

    <!--科普百科正文内容-->
    <main class="knowledge-container">
        <div class="container">

            <!-- 添加代码开始 -->
      <section class="knowledge-hub">
                <div class="hub-header">
                    <h1>文化科普百科</h1>
                    <div class="hub-filters">
                        <select id="culture-filter" aria-label="按文化筛选">
                            <option value="all">所有文化</option>

                            <option value="opera">京剧脸谱</option>

                        </select>
                        <select id="category-filter" aria-label="按类别筛选">
                            <option value="all">所有分类</option>
                            <option value="history">历史渊源</option>
                            <option value="technique">工艺技法</option>
                            <option value="modern">现代表达</option>
                        </select>
                    </div>
                </div>
                <div>
                <a class="knowledge-grid">
                    <!-- 科普内容卡片会动态加载 -->

                       <div class="culture-card">

                            <div class="culture-header">
                                <a href="art.html" class="culture-card">
                                <div class="culture-icon"><i class="fas fa-palette"></i></div>
                                <h3 class="culture-title">扎染艺术</h3>
                                <p class="culture-desc">中国传统染色技艺的现代传承与创新</p>
                                    <div class="culture-stats">
                                    <span>12个角色</span>
                                    <span>24个故事</span>
                                    </div>
                                </a>
                        </div>
                         <div class="culture-card">
                            <div class="culture-header">
                                <div class="culture-icon"><i class="fas fa-mask"></i></div>
                                <h3 class="culture-title">京剧脸谱</h3>
                                <p class="culture-desc">中国传统戏曲的视觉符号系统</p>
                                <div class="culture-stats">
                                    <span>8个角色</span>
                                    <span>15个故事</span>
                                </div>
                            </div>
                        </div>




                <div class="contribute-prompt">
                    <p>想要分享您所知道的文化知识？</p>
                    <p>我们欢迎经过认证的文化传承者贡献内容</p>
    <a href="become.html" class="contribute-btn">
        <i class="fas fa-plus"></i> 申请成为贡献者
    </a>
</div>



            <!--内容编辑器部分-->
      <section class="knowledge-editor">
                <div class="editor-meta">
                    <input type="text" placeholder="科普标题" class="title-input" aria-label="科普标题">
                    <select class="culture-select" aria-label="选择所属文化">
                        <option value="">选择所属文化</option>
                        <!-- 动态加载文化选项 -->
                    </select>
                </div>


                        <div class="section-toolbox">
                        <h3>内容板块库</h3>
                        <div class="toolbox-items">
                            <div class="tool-item" draggable="true" data-type="text" title="文本段落">
                                <i class="fas fa-paragraph"></i> 文本段落
                            </div>
                            <div class="tool-item" draggable="true" data-type="comparison" title="对比表格">
                                <i class="fas fa-balance-scale"></i> 对比表格
                            </div>
                            <div class="tool-item" draggable="true" data-type="steps" title="步骤流程">
                                <i class="fas fa-list-ol"></i> 步骤流程
                            </div>
                            <div class="tool-item" draggable="true" data-type="video" title="视频嵌入">
                                <i class="fas fa-video"></i> 视频嵌入
                            </div>
                            <div class="tool-item" draggable="true" data-type="custom" title="自定义板块">
                                <i class="fas fa-puzzle-piece"></i> 自定义板块
                            </div>
                        </div>
                    </div>


                    <div class="editor-canvas" id="editor-canvas">
                    <!-- 拖放板块到这里 -->
                </div>

                <div class="editor-actions">
                    <button class="btn-secondary">保存草稿</button>
                    <button class="btn-primary">提交审核</button>
                    <button class="btn-request" id="request-new-section" title="申请新板块类型">
                        <i class="fas fa-star"></i> 申请新板块类型
                    </button>
                </div>
            </section>




   <!-- 页脚容器 -->
    <div id="footer"></div>

        <script>
            // 加载公共部分
        document.addEventListener('DOMContentLoaded', function() {
            // 加载页眉
            fetch('header.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById('header').innerHTML = data;
                    // 初始化导航栏脚本
                    initHeaderScripts();
                })
                .catch(error => {
                    console.error('Error loading header:', error);
                    document.getElementById('header').innerHTML = '<div class="container"><a href="index.html" class="logo">檐下风铃</a></div>';
                });

            // 加载页脚
            fetch('footer.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById('footer').innerHTML = data;
                })
                .catch(error => {
                    console.error('Error loading footer:', error);
                    document.getElementById('footer').innerHTML = '<footer><div class="container"><p>&copy; 2023 檐下风铃</p></div></footer>';
                });

            // 初始化社区页面功能
            initCommunityPage();
        });

        // 初始化导航栏脚本
        function initHeaderScripts() {
            // 移动菜单切换
            const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
            const mobileNavMenu = document.querySelector('.mobile-nav-menu');

            if (mobileMenuBtn && mobileNavMenu) {
                mobileMenuBtn.addEventListener('click', function() {
                    const isExpanded = mobileMenuBtn.getAttribute('aria-expanded') === 'true' || false;
                    mobileMenuBtn.setAttribute('aria-expanded', !isExpanded);
                    mobileNavMenu.classList.toggle('active');
                    const icon = mobileMenuBtn.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('fa-bars');
                        icon.classList.toggle('fa-times');
                    }
                });
            }

            // 导航高亮
            const currentLocation = window.location.pathname.split('/').pop() || 'index.html';
            const navLinksDesktop = document.querySelectorAll('.navbar .desktop-nav .nav-links a');
            const navLinksMobile = document.querySelectorAll('.mobile-nav-menu .nav-links a');

            function setActiveLink(links) {
                links.forEach(link => {
                    const linkPage = link.getAttribute('href').split('/').pop() || 'index.html';
                    if (linkPage === currentLocation) {
                        link.classList.add('active-link');
                    } else {
                        link.classList.remove('active-link');
                    }
                });
            }
            setActiveLink(navLinksDesktop);
            setActiveLink(navLinksMobile);
        }
        document.addEventListener('DOMContentLoaded', function() {
            // --- Navbar Mobile Menu Toggle (Copied from index.html) ---
            const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
            const mobileNavMenu = document.querySelector('.mobile-nav-menu');
            if (mobileMenuBtn && mobileNavMenu) {
                mobileMenuBtn.addEventListener('click', function() {
                    const isExpanded = mobileMenuBtn.getAttribute('aria-expanded') === 'true' || false;
                    mobileMenuBtn.setAttribute('aria-expanded', !isExpanded);
                    mobileNavMenu.classList.toggle('active');
                    const icon = mobileMenuBtn.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('fa-bars');
                        icon.classList.toggle('fa-times');
                    }
                });
            }
            // --- Active Link Highlighting (Copied from index.html) ---
            const currentLocation = window.location.pathname.split('/').pop() || 'index.html';
            const navLinksDesktop = document.querySelectorAll('.navbar .desktop-nav .nav-links a');
            const navLinksMobile = document.querySelectorAll('.mobile-nav-menu .nav-links a');
            function setActiveLink(linksCollection) {
                 if (!linksCollection) return;
                linksCollection.forEach(link => {
                    const linkPage = (link.getAttribute('href') || '').split('/').pop() || 'index.html';
                    if (linkPage === currentLocation) {
                        link.classList.add('active-link');
                    } else {
                        link.classList.remove('active-link');
                    }
                });
            }
            setActiveLink(navLinksDesktop);
            setActiveLink(navLinksMobile);

           // ---
        });
    </script>
    </main>
</html>
